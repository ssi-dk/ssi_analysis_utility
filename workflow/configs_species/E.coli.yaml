###################### BACTERIAL SPECIES ###################################
# This config defines analyses for the specified bacterial species e.g E.Coli  
# and associated parameters.

analyses_to_run: 
    KMA_filter:
        Title : Kmer Aligner for Escherichia coli OH and stx typing
        ID: 92
        input_folder: kmeraligner
        options: --Gene_list stx wzx wzy wzt wzm fliC fli eae ehxA --organism "Escherichia coli" --suffix tsv
        thresholds:
            stx: [90, 90, 10]
            wzx: [90, 90, 10]
            wzy: [90, 90, 10]
            wzt: [90, 90, 10]
            wzm: [90, 90, 10]
            fliC: [90, 90, 10]
            fli: [90, 90, 10]
            eae: [90, 90, 10]
            ehxA: [90, 90, 10]
            other: [98, 98, 10]