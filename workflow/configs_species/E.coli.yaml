analyses_to_run: 

    kma_filter:
        options: --organism 'Escherichia coli'
        database: [ecoligenes]
    
    resfinder:
        options: --species 'Escherichia coli'

    plasmidfinder: true

    virulencefinder: true

    serotypefinder: true
    
    amrfinder:
        options: --organism 'Escherichia'
        assemblers: [skesa]  
    
    chtyper:
        database: fumCH_db 
    
    mlst:
        assemblers: [skesa]  
    
    custom_blaster:
        options: "-perc_identity 90.0"
        assemblers: [skesa]
        database : [OXAndm]
