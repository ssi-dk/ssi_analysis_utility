analyses_to_run: 

    kmeraligner:
        options: -nc -ref_fsa -nf -sam 4

    bowtie2:
        options: --very-sensitive-local --no-unal -a 

    kmerconsensus:
        ID: 90


    KMA_filter:
        Title : Kmer Aligner for Clostridium difficile Toxin detection
        ID: 92
        input_folder: kmeraligner
        options: --organism "Clostridioides difficile" --suffix tsv
        thresholds:
            tcdA: [90, 90, 10]
            tcdB: [90, 90, 10]
            tcdC: [90, 90, 10]
            cdtAB: [90, 90, 10]
            other: [98, 98, 10]

    plasmidfinder: 

    resfinder: 

    virulencefinder : 

    serotypefinder :

    amrfinder:
        options: --organism 'Clostridioides_difficile'

    mlst:

    CDiff_Repeat_identifier:
        ID: 92
        repeats: TR6 TR10
        combos: TRST 
        database: resources/Clostridioides_difficile_db/TRST

    samtools:
        view: 
            options: -q 20 

        sort: 
            options: -n 
    
    bcftools:
        view:
            region: AM180355.1_tcdC_804309_805008
            options: -v indels -i 'INFO/DP>10'

    Variant_identifier:
        ID: 93
        options : --gene_list tcdC  --organism 'Clostridioides difficile' --suffix tsv --deletion_region_buffer 5 --partial_overlap 0.3
        snp_info:
            snp_117: [117,"A","T","tcdC","-"]
            snp_184: [184,"C","T","tcdC","-"]
        deletion_regions:
            del330_347_18: [330, 347]
            del301_336_36: [301, 336]
            del341_379_39: [341, 379]
            del313_366_54: [313, 366]
        deletion_consensus_thresholds:
            del330_347_18: [70]
            del301_336_36: [70]
            del341_379_39: [70]
            del313_366_54: [70]
        variant_gt_thresholds:
            del330_347_18: [0.10,5,10]
            del301_336_36: [0.10,5,10]
            del341_379_39: [0.10,5,10]
            del313_366_54: [0.10,5,10]

