    database: Cdiff_Toxins

snp_identifier:
    options: --organism 'Clostridioides difficile'
    database: Cdiff_Toxins

deletion_identifier:
    options: --organism 'Clostridioides difficile' --deletion_region_buffer 5 --partial_overlap 0.3
