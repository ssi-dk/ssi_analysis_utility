[build-system]
requires = ["hatchling>=1.25"]
build-backend = "hatchling.build"

[project]
name = "MMAseq"
version = "1.0.0"
description = "Mixed Microbial Analysis on Sequencing data"
readme = "README.md"
requires-python = ">3.9"
dependencies = ["snakemake", "pandas"]

[tool.hatch.build]
exclude = ["/data/reads/*gz", "/Deploy/*", "/Test/*"]
include = ["/src/*", "/workflow/*", "/config/*", "/data/*"]

[tool.hatch.build.targets.wheel]
packages = ["src/mmaseq"]

[project.scripts]
mmaseq = "mmaseq:launcher"
